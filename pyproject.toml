[build-system]
requires = ["setuptools>=61.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "gaia-pdf-parser"
version = "1.0.1"
description = "General-purpose PDF to CSV data extraction library."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "pypdf>=6.13.0",
]

[project.scripts]
gaia = "gaia.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["gaia*"]

[tool.setuptools.package-data]
gaia = ["locale/**/*.po", "locale/**/*.mo"]
